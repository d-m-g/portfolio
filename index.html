    <!-- The mark, in three cuts, because one was never enough. It lived here as a
         lone inline SVG and rendered in almost nothing: Safari has never supported
         an SVG favicon at any version, so the tab quietly drew a blank; iOS reads
         only apple-touch-icon for a Home Screen tile — never rel=icon — and will
         not take a data: URI for it, so the tile was blank too; and anything that
         fetches an icon *out of band*, without reading this document, probes
         /favicon.ico, which vercel.json's catch-all was answering with this very
         page. An HTML document served as an image decodes to nothing, so that
         drew a blank as well. Real files sit at those paths now, and Vercel checks
         the filesystem before it rewrites.

         favicon.ico holds the 16, 32 and 48 rasters in one file and is the one
         doing the work. icon.svg stays for the browsers that support it, being
         the cut that keeps its edges at any size. apple-touch-icon.png is
         full-bleed and square on purpose: iOS masks its own squircle, and
         pre-rounded corners get rounded twice.

         public/icon.svg is the source all three are cut from. -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
